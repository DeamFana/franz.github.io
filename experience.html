<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作经历 - 张三22211212</title>
  <style>
:root {
  --background: #ffffff;
  --foreground: #1a1a1a;
  --primary: #3b82f6;
  --secondary: #6b7280;
  --muted: #9ca3af;
  --border: #e5e7eb;
  --card-bg: #f9fafb;
}

[data-theme="dark"] {
  --background: #1a1a1a;
  --foreground: #f9fafb;
  --primary: #60a5fa;
  --secondary: #9ca3af;
  --muted: #6b7280;
  --border: #374151;
  --card-bg: #111827;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--background); color: var(--foreground); line-height: 1.6; }
.container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }
header { position: sticky; top: 0; background: var(--background); border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); }
.header-inner { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; }
.logo { font-size: 1.5rem; font-weight: bold; }
nav { display: flex; gap: 1.5rem; }
nav a { color: var(--secondary); font-weight: 500; }
nav a:hover { color: var(--foreground); }
.hero { text-align: center; padding: 3rem 0; }
.hero h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
.hero .label { font-size: 1.25rem; color: var(--primary); margin-bottom: 1rem; }
.hero .summary { color: var(--secondary); max-width: 600px; margin: 0 auto 2rem; }
.contact { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
.contact a { display: inline-flex; align-items: center; gap: 0.25rem; }
section { margin-bottom: 3rem; }
section h2 { font-size: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--primary); display: inline-block; }
.card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1rem; }
.card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
.card h3 { font-size: 1.125rem; }
.card .company { color: var(--secondary); }
.card .date { color: var(--muted); font-size: 0.875rem; }
.card ul { margin-left: 1.25rem; margin-top: 0.5rem; }
.card li { margin-bottom: 0.25rem; }
.skills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.skill-tag { background: var(--primary); color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
.project-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.5rem; }
.project-card h3 { margin-bottom: 0.5rem; }
.project-card .description { color: var(--secondary); margin-bottom: 1rem; }
.project-card .keywords { display: flex; flex-wrap: wrap; gap: 0.25rem; }
.project-card .keyword { background: var(--border); padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; }
footer { border-top: 1px solid var(--border); padding: 2rem 0; text-align: center; color: var(--muted); margin-top: 3rem; }
.theme-toggle { background: none; border: 1px solid var(--border); padding: 0.5rem; border-radius: 0.25rem; cursor: pointer; color: var(--foreground); }
@media (max-width: 640px) { nav { display: none; } }
</style>
  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
    function toggleTheme() {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    }
  </script>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="./index.html" class="logo">Resume</a>
      <nav>
        <a href="./index.html">首页</a>
        <a href="./about.html">关于</a>
        <a href="./experience.html">经历</a>
        <a href="./projects.html">项目</a>
        <a href="./contact.html">联系</a>
      </nav>
      <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>
  </header>
  <main class="container">
    
    <h1>工作经历</h1>
    
      <div class="card">
        <div class="card-header">
          <h3>前端工程师</h3>
          <span class="company">某互联网公司</span>
        </div>
        <p class="date">2023-03 - 至今</p>
        <p>负责公司核心产品的前端开发</p>
        <ul><li>主导了 React 组件库的建设</li><li>优化了页面加载性能，PWA 优化提升 40%</li><li>引入自动化测试，代码覆盖率提升至 80%</li></ul>
      </div>
    
    <h2>教育经历</h2>
    
      <div class="card">
        <div class="card-header">
          <h3>某某大学</h3>
          <span class="date">2015-09 - 2019-06</span>
        </div>
        <p>计算机科学与技术 - 学士</p>
      </div>
    
  
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2026 张三22211212. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
