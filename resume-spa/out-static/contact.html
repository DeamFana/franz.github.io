<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>联系方式 - 张三22211212</title><style>
:root {
  --bg: #f0f4f8;
  --fg: #1a1a2e;
  --card-bg: rgba(255, 255, 255, 0.7);
  --card-border: rgba(255, 255, 255, 0.8);
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --secondary: #64748b;
  --accent: #06b6d4;
  --accent2: #f472b6;
  --muted: #94a3b8;
  --glass: rgba(255,255,255,0.6);
  --glass-border: rgba(255,255,255,0.7);
  --glow: rgba(99,102,241,0.35);
  --border: rgba(148,163,184,0.2);
  --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
[data-theme="dark"] {
  --bg: #0a0a0f;
  --fg: #f1f5f9;
  --card-bg: rgba(25,25,40,0.75);
  --card-border: rgba(255,255,255,0.08);
  --primary: #818cf8;
  --primary-hover: #a5b4fc;
  --secondary: #94a3b8;
  --accent: #22d3ee;
  --accent2: #f472b6;
  --muted: #64748b;
  --glass: rgba(25,25,40,0.6);
  --glass-border: rgba(255,255,255,0.06);
  --glow: rgba(129,140,248,0.25);
  --border: rgba(148,163,184,0.12);
}
@media (prefers-color-scheme:dark) {
  :root:not([data-theme="light"]) {
    --bg: #0a0a0f;--fg: #f1f5f9;--card-bg: rgba(25,25,40,0.75);
    --primary: #818cf8;--primary-hover: #a5b4fc;
    --accent: #22d3ee;--accent2: #f472b6;
    --glass: rgba(25,25,40,0.6);--glass-border: rgba(255,255,255,0.06);
    --glow: rgba(129,140,248,0.25);--border: rgba(148,163,184,0.12);
  }
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

/* 全局过渡 */
*,*::before,*::after{transition:background 0.3s ease,border-color 0.3s ease,color 0.3s ease,box-shadow 0.3s ease,transform 0.3s ease,opacity 0.3s ease}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--fg);line-height:1.8;
  min-height:100vh;display:flex;flex-direction:column;
  position:relative;overflow-x: hidden
}

/* 背景 */
.bg-anim{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;overflow:hidden}
.bg-grad{position:absolute;width:600px;height:600px;border-radius:50%;filter:blur(100px);opacity:0.4;animation:floatB 20s ease-in-out infinite}
.bg-g1{top:-200px;left:-200px;background:var(--primary)}
.bg-g2{bottom:-200px;right:-200px;background:var(--accent);animation-delay:-10s}
.bg-g3{top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;background:var(--accent2);opacity:0.25;animation:pulseB 15s ease-in-out infinite}
@keyframes floatB{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,30px) scale(1.1)}66%{transform:translate(-30px,50px) scale(0.9)}}
@keyframes pulseB{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.25}50%{transform:translate(-50%,-50%) scale(1.5);opacity:0.1}}
.grid{position:absolute;width:200%;height:200%;top:-50%;left:-50%;background-image:linear-gradient(rgba(99,102,241,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.025) 1px,transparent 1px);background-size:50px 50px;animation:gridM 40s linear infinite}
@keyframes gridM{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

a{color:var(--primary);text-decoration:none;transition:var(--transition)}
a:hover{color:var(--primary-hover)}

.container{max-width:900px;margin:0 auto;padding:0 1.5rem;flex:1;display:flex;flex-direction:column}

/* Header - 修复手机端导航 */
header{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border)}
.h-inner{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;gap:1rem}
.logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;flex-shrink:0}
.logo:hover{background-position:right center}

/* 导航 - 手机端保持显示 */
nav{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center}
nav a{color:var(--secondary);font-weight:500;position:relative;padding:0.25rem 0;white-space:nowrap;font-size:0.95rem}
nav a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width 0.4s}
nav a:hover{color:var(--fg)}
nav a:hover::after{width:100%}

.theme-toggle{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);padding:0.5rem 0.75rem;border-radius:0.5rem;cursor:pointer;flex-shrink:0}

/* Hero */
.hero{text-align:center;padding:4rem 0 3rem}
.hero h1{font-size:3.5rem;font-weight:800;margin-bottom:0.5rem;letter-spacing:-0.02em}
.hero h1 .name{background:linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#54a0ff,#5f27cd);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:rainbow 5s linear infinite;cursor:default}
.hero h1 .name::after{content:'✨';position:absolute;right:-40px;top:0;font-size:1.5rem;opacity:0;transition:var(--transition)}
.hero h1 .name:hover::after{opacity:1;transform:scale(1.2) rotate(10deg)}
@keyframes rainbow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.hero .label{font-size:1.25rem;color:var(--primary);margin-bottom:1rem;font-weight:600}
.hero .summary{color:var(--secondary);max-width:600px;margin:0 auto 2rem;font-size:1.1rem}

/* 联系 */
.contact{display:flex;flex-wrap:wrap;justify-content:center;gap:1rem}
.contact a{display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.2rem;background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:0.75rem;color:var(--secondary);transition:var(--transition);position:relative;overflow:hidden}
.contact a::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left 0.5s}
.contact a:hover::before{left:100%}
.contact a:hover{color:var(--fg);border-color:var(--primary);transform:translateY(-3px);box-shadow:0 10px 30px var(--glow)}

/* Section */
section{margin-bottom:2.5rem}
.s-title{font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.75rem}
.s-title::before{content:'';width:4px;height:1.5rem;background:linear-gradient(180deg,var(--primary),var(--accent));border-radius:2px}

/* 技能 */
.skills{display:flex;flex-wrap:wrap;gap:0.75rem}
.skill-tag{display:inline-flex;align-items:center;padding:0.6rem 1.25rem;background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(6,182,212,0.1));border:1px solid rgba(99,102,241,0.2);border-radius:9999px;font-size:0.9rem;font-weight:500;transition:var(--transition);cursor:default}
.skill-tag:hover{transform:translateY(-3px) scale(1.05);border-color:var(--primary);box-shadow:0 8px 25px var(--glow),0 0 20px rgba(6,182,212,0.25)}

/* 卡片 - 增强版 */
.card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:1.25rem;padding:2rem;margin-bottom:1.25rem;transition:var(--transition);position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,transparent 60%);opacity:0;transition:opacity 0.4s;pointer-events:none}
.card:hover::after{opacity:1}
.card:hover{transform:translateY(-6px);border-color:rgba(99,102,241,0.25);box-shadow:0 25px 50px rgba(0,0,0,0.12),0 0 0 1px var(--primary)}

/* 卡片内部布局 - 增强装饰 */
.card{position:relative;padding-left:2.5rem}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--primary),var(--accent));border-radius:2px}
.card-header{position:relative;margin-bottom:1rem}
.card-header h3{font-size:1.25rem;font-weight:700;color:var(--fg)}
.card-header .company{color:var(--primary);font-weight:600;display:block;margin-top:0.25rem}
.card .date{color:var(--muted);font-size:0.85rem;margin-bottom:0.75rem;padding:0.25rem 0.75rem;background:rgba(99,102,241,0.1);border-radius:9999px;display:inline-block}
.card > p{color:var(--secondary);margin-bottom:0.75rem}
.card ul{list-style:none;margin:0;padding:0}
.card li{color:var(--secondary);margin-bottom:0.6rem;padding-left:1.25rem;position:relative}
.card li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-weight:bold}

/* 项目卡片 */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
.project-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:1.25rem;padding:1.75rem;transition:var(--transition);position:relative}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:1.25rem 1.25rem 0 0}
.project-card:hover{transform:translateY(-8px);border-color:rgba(99,102,241,0.35);box-shadow:0 30px 60px rgba(0,0,0,0.15),0 0 30px var(--glow)}
.project-card h3{font-size:1.3rem;font-weight:700;margin-bottom:0.75rem;padding-bottom:0.75rem;border-bottom:2px solid var(--border)}
.project-card .desc{color:var(--secondary);margin-bottom:1rem;line-height:1.7}
.project-card ul{margin-bottom:1rem}
.project-card .kw{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.project-card .keyword{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(6,182,212,0.15));padding:0.35rem 0.9rem;border-radius:9999px;font-size:0.8rem;border:1px solid rgba(99,102,241,0.25);color:var(--fg)}

/* Footer */
footer{border-top:1px solid var(--border);padding:2rem 0;text-align:center;color:var(--muted);margin-top:auto;background:var(--glass);backdrop-filter:blur(20px)}

/* 动画类 - 使用 sessionStorage 防止重复播放 */
.anim-init{opacity:0;transform:translateY(25px)}
.anim-done{opacity:1;transform:translateY(0);transition:opacity 0.7s ease,transform 0.7s ease}

/* 响应式 - 修复导航 */
@media(max-width:900px){.container{max-width:100%}}
@media(max-width:768px){
  .hero h1{font-size:2.5rem}
  .hero .label{font-size:1.1rem}
  .hero .summary{font-size:1rem}
  .h-inner{justify-content:space-between}
  nav{gap:1rem}
  nav a{font-size:0.85rem}
  .projects-grid{grid-template-columns:1fr}
  .card{padding:1.5rem;padding-left:1.75rem}
  .card::before{width:3px}
  .contact{gap:0.5rem}
  .contact a{padding:0.5rem 0.75rem;font-size:0.85rem}
}
@media(max-width:480px){
  .hero h1{font-size:2rem}
  .hero{padding:3rem 0 2rem}
  .container{padding:0 1rem}
  .s-title{font-size:1.25rem}
  .skill-tag{padding:0.5rem 1rem;font-size:0.85rem}
  .project-card{padding:1.25rem}
}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--primary)}
</style></head>
<body>
<div class="bg-anim"><div class="grid"></div><div class="bg-grad bg-g1"></div><div class="bg-grad bg-g2"></div></div>
<header><div class="container h-inner"><a href="./index.html" class="logo">Resume</a>
<nav><a href="./index.html">首页</a><a href="./about.html">关于</a><a href="./experience.html">经历</a><a href="./projects.html">项目</a><a href="./contact.html">联系</a></nav>
<button class="theme-toggle" onclick="toggleTheme()">🌓</button></div></header>
<main class="container"><h1 class="s-title anim-init">联系方式</h1><div class="card anim-init"><p style="margin-bottom:0.75rem">📧 <a href="mailto:zhangsan@example.com">zhangsan@example.com</a></p><p style="margin-bottom:0.75rem">📞 <a href="tel:+86 138-0000-0000">+86 138-0000-0000</a></p><p style="margin-bottom:0.75rem">🌐 <a href="https://zhangsan.dev" target="_blank">https://zhangsan.dev</a></p><p style="margin-bottom:0.75rem">GitHub: <a href="https://github.com/zhangsan" target="_blank">https://github.com/zhangsan</a></p><p style="margin-bottom:0.75rem">掘金: <a href="https://juejin.cn/user/zhangsan" target="_blank">https://juejin.cn/user/zhangsan</a></p></div></main>
<footer class="anim-init"><div class="container"><p>&copy; 2026 张三22211212. All rights reserved.</p></div></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<script>
(function(){
  const stored = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (stored === 'dark' || (!stored && prefersDark)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  
  const animKey = 'anim_played_' + location.pathname;
  const alreadyPlayed = sessionStorage.getItem(animKey);
  
  if (alreadyPlayed) {
    document.querySelectorAll('.anim-init').forEach(el => el.classList.add('anim-done'));
  } else {
    sessionStorage.setItem(animKey, 'true');
    anime({ targets: '.card', opacity: [0, 1], translateX: [-25, 0], delay: anime.stagger(100), duration: 600, easing: 'easeOutExpo' });
    anime({ targets: '.project-card', opacity: [0, 1], translateY: [30, 0], delay: anime.stagger(100), duration: 600, easing: 'easeOutExpo' });
    anime({ targets: '.s-title', opacity: [0, 1], translateX: [-15, 0], delay: anime.stagger(80), duration: 500, easing: 'easeOutExpo' });
    setTimeout(() => {
      document.querySelectorAll('.anim-init').forEach(el => el.classList.add('anim-done'));
    }, 1500);
  }
  
  anime({ targets: '.bg-g1', translateX: [0, 80], translateY: [0, 40], duration: 12000, easing: 'easeInOutSine', direction: 'alternate', loop: true });
  anime({ targets: '.bg-g2', translateX: [0, -60], translateY: [0, -30], duration: 15000, easing: 'easeInOutSine', direction: 'alternate', loop: true });
  
  document.querySelectorAll('.card, .project-card').forEach(el => {
    el.addEventListener('mouseenter', () => anime({ targets: el, scale: 1.02, duration: 250, easing: 'easeOutExpo' }));
    el.addEventListener('mouseleave', () => anime({ targets: el, scale: 1, duration: 250, easing: 'easeOutExpo' }));
  });
})();
function toggleTheme(){
  const html = document.documentElement;
  if (html.getAttribute('data-theme') === 'dark') { html.setAttribute('data-theme', 'light'); localStorage.setItem('theme', 'light'); }
  else { html.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); }
}
</script>
</body></html>
